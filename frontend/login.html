<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Postrilandia</title>
    <meta name="description" content="Inicia sesión en Postrilandia para acceder a los mejores postres.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffe4ec 100%);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(192, 57, 43, 0.15);
            max-width: 420px;
            width: 100%;
        }
        .btn-rosa {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-rosa:hover {
            background: linear-gradient(135deg, #a93226, #cb4335);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.35);
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1.5px solid #f5c6cb;
            padding: 12px 15px;
            transition: border-color 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #c0392b;
            box-shadow: 0 0 0 3px rgba(192,57,43,0.12);
        }
        .link-auth { color: #c0392b; text-decoration: none; font-weight: 500; }
        .link-auth:hover { text-decoration: underline; color: #a93226; }
        .input-icon { position: relative; }
        .input-icon .icon {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            font-size: 16px; z-index: 2;
        }
        .input-icon .form-control { padding-left: 40px; }
        .pass-toggle {
            position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #aaa; font-size: 16px; z-index: 2;
        }
        .divider {
            display: flex; align-items: center; gap: 10px;
            color: #ccc; font-size: 13px; margin: 6px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; border-top: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center py-5 min-vh-100">
        <div class="login-card card p-4 p-md-5 my-auto">

            <div class="text-center mb-4">
                <div style="font-size:3rem;">🍰</div>
                <h1 style="color:#c0392b; font-weight:700;" class="fs-3 mb-1">Postrilandia</h1>
                <p class="text-muted small">Inicia sesión para continuar</p>
            </div>

            <div class="input-icon mb-3">
                <span class="icon">👤</span>
                <input type="text" id="usuario" class="form-control"
                       placeholder="Usuario" autocomplete="username">
            </div>

            <div class="input-icon mb-3" style="position:relative;">
                <span class="icon">🔒</span>
                <input type="password" id="password" class="form-control"
                       placeholder="Contraseña" autocomplete="current-password">
                <span class="pass-toggle" onclick="togglePass()">👁️</span>
            </div>

            <select id="rol" class="form-select mb-2">
                <option value="cliente">👤 Cliente</option>
                <option value="admin">👨‍💼 Administrador</option>
            </select>

            <div class="text-end mb-4">
                <a href="recuperar.html" class="link-auth small">¿Olvidaste tu contraseña?</a>
            </div>

            <div id="alerta-error" class="alert alert-danger rounded-3 d-none py-2 mb-3"></div>

            <button id="btnLogin" class="btn btn-rosa w-100 py-3 mb-3" onclick="iniciarSesion()">
                <span id="btnTexto">Iniciar sesión</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
            </button>

            <div class="divider">o</div>

            <div class="text-center mt-3">
                <p class="text-muted small mb-0">
                    ¿No tienes cuenta?
                    <a href="registro.html" class="link-auth">Regístrate gratis</a>
                </p>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
