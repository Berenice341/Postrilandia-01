<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Correo - Postrilandia</title>
    <meta name="description" content="Verificación de correo electrónico de Postrilandia.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffe4ec 100%);
            min-height: 100vh;
        }
        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(192, 57, 43, 0.15);
            max-width: 420px;
            width: 100%;
        }
        .btn-rosa {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-rosa:hover {
            background: linear-gradient(135deg, #a93226, #cb4335);
            color: white;
            transform: translateY(-1px);
        }
        .spinner-wrap { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        .big-icon { font-size: 4rem; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="auth-card card p-5 text-center">

            <div class="mb-3" style="font-size:2rem;">🍰</div>
            <h1 class="fs-4 fw-bold mb-4" style="color:#c0392b;">Postrilandia</h1>

            <!-- Estado: cargando -->
            <div id="estadoCargando">
                <div class="spinner-border text-danger mb-3" role="status"></div>
                <p class="text-muted">Verificando tu correo...</p>
            </div>

            <!-- Estado: éxito -->
            <div id="estadoExito" class="d-none">
                <div class="big-icon mb-3">✅</div>
                <h5 class="text-success fw-bold">¡Correo verificado!</h5>
                <p class="text-muted">Tu cuenta ha sido activada exitosamente. Ya puedes iniciar sesión.</p>
                <a href="login.html" class="btn btn-rosa px-5 mt-2">Iniciar sesión</a>
            </div>

            <!-- Estado: error -->
            <div id="estadoError" class="d-none">
                <div class="big-icon mb-3">❌</div>
                <h5 class="text-danger fw-bold">Enlace inválido</h5>
                <p class="text-muted" id="mensajeError">El enlace de verificación es inválido o ya fue usado.</p>
                <a href="registro.html" class="btn btn-rosa px-5 mt-2">Crear nueva cuenta</a>
            </div>

        </div>
    </div>

    <script>
        (async function verificar() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                mostrarError('No se encontró el token de verificación en el enlace.');
                return;
            }

            try {
                const res = await fetch(`/usuarios/verificar/${token}`);
                const data = await res.json();

                document.getElementById('estadoCargando').classList.add('d-none');

                if (res.ok) {
                    document.getElementById('estadoExito').classList.remove('d-none');
                } else {
                    document.getElementById('mensajeError').textContent = data.mensaje;
                    document.getElementById('estadoError').classList.remove('d-none');
                }
            } catch (err) {
                mostrarError('No se pudo conectar al servidor.');
            }
        })();

        function mostrarError(msg) {
            document.getElementById('estadoCargando').classList.add('d-none');
            document.getElementById('mensajeError').textContent = msg;
            document.getElementById('estadoError').classList.remove('d-none');
        }
    </script>
</body>
</html>
