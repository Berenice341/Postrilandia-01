<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Postrilandia</title>
    <meta name="description" content="Regístrate en Postrilandia y descubre los mejores postres.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffe4ec 100%);
            min-height: 100vh;
        }
        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(192, 57, 43, 0.15);
            max-width: 440px;
            width: 100%;
        }
        .auth-title { color: #c0392b; font-weight: 700; }
        .btn-rosa {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-rosa:hover {
            background: linear-gradient(135deg, #a93226, #cb4335);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.35);
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1.5px solid #f5c6cb;
            padding: 12px 15px;
            transition: border-color 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #c0392b;
            box-shadow: 0 0 0 3px rgba(192,57,43,0.12);
        }
        .link-auth { color: #c0392b; text-decoration: none; font-weight: 500; }
        .link-auth:hover { text-decoration: underline; color: #a93226; }
        .input-icon { position: relative; }
        .input-icon .icon {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            font-size: 16px; z-index: 2;
        }
        .input-icon .form-control { padding-left: 40px; }
        .pass-toggle {
            position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #aaa; font-size: 16px; z-index: 2;
        }
        .strength-bar { height: 4px; border-radius: 4px; transition: all 0.3s; margin-top: 6px; }
        #msgExito {
            display: none;
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            border: none;
            border-radius: 12px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center py-5 min-vh-100">
        <div class="auth-card card p-4 p-md-5 my-auto">

            <div class="text-center mb-4">
                <div style="font-size:3rem;">🍰</div>
                <h1 class="auth-title fs-3 mb-1">Postrilandia</h1>
                <p class="text-muted small">Crea tu cuenta para empezar</p>
            </div>

            <!-- Mensaje de éxito -->
            <div id="msgExito" class="text-center">
                <div style="font-size:3rem;">📧</div>
                <h5 class="text-success fw-bold mt-2">¡Cuenta creada!</h5>
                <p class="text-muted small" id="textoExito"></p>
                <a href="login.html" class="btn btn-rosa mt-2 px-4">Ir al inicio de sesión</a>
            </div>

            <!-- Formulario -->
            <form id="formRegistro" onsubmit="registrar(event)" novalidate>

                <div class="input-icon mb-3">
                    <span class="icon">👤</span>
                    <input type="text" id="usuario" class="form-control"
                           placeholder="Nombre de usuario" required autocomplete="username">
                </div>

                <div class="input-icon mb-3">
                    <span class="icon">📧</span>
                    <input type="email" id="correo" class="form-control"
                           placeholder="Correo electrónico" required autocomplete="email">
                </div>

                <div class="input-icon mb-1" style="position:relative;">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" class="form-control"
                           placeholder="Contraseña (mín. 6 caracteres)"
                           required oninput="checkStrength()" autocomplete="new-password">
                    <span class="pass-toggle" onclick="togglePass('password', this)">👁️</span>
                </div>
                <div class="strength-bar mb-3" id="strengthBar" style="background:#eee; width:0%"></div>

                <div class="input-icon mb-3" style="position:relative;">
                    <span class="icon">🔒</span>
                    <input type="password" id="confirmar" class="form-control"
                           placeholder="Confirmar contraseña"
                           required autocomplete="new-password">
                    <span class="pass-toggle" onclick="togglePass('confirmar', this)">👁️</span>
                </div>

                <select id="rol" class="form-select mb-4" required>
                    <option value="cliente">👤 Cliente</option>
                    <option value="admin">👨‍💼 Administrador</option>
                </select>

                <div id="alertaError" class="alert alert-danger rounded-3 d-none py-2 mb-3"></div>

                <button type="submit" id="btnRegistrar" class="btn btn-rosa w-100 py-3 mb-3">
                    <span id="btnTexto">Crear cuenta</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                </button>

                <p class="text-center text-muted small mb-0">
                    ¿Ya tienes cuenta?
                    <a href="login.html" class="link-auth">Inicia sesión</a>
                </p>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="registro.js"></script>
</body>
</html>
