<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - Postrilandia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark">
        <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
            <h1 class="text-white fs-4 mb-0">🍰 Postrilandia</h1>
            <div class="d-flex align-items-center gap-2">
                <span class="text-white small d-none d-sm-inline">Hola, <strong id="nombreCliente"></strong></span>
                <button class="btn btn-light btn-sm" onclick="irCarrito()">🛒 Carrito</button>
                <button class="btn btn-danger btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="hero">
            <h1>Bienvenido a Postrilandia</h1>
            <p>Los mejores postres, directo a tu puerta 🎂</p>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row" id="listaProductos">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-danger" role="status"></div>
                <p class="mt-2 text-muted">Cargando productos...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('nombreCliente').textContent =
            localStorage.getItem('usuario') || 'Cliente';
    </script>
    <script src="tienda.js"></script>
</body>
</html>
