<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Postrilandia</title>
    <meta name="description" content="Recupera el acceso a tu cuenta de Postrilandia.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffe4ec 100%);
            min-height: 100vh;
        }
        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(192, 57, 43, 0.15);
            max-width: 420px;
            width: 100%;
        }
        .btn-rosa {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-rosa:hover {
            background: linear-gradient(135deg, #a93226, #cb4335);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.3);
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #f5c6cb;
            padding: 12px 15px;
        }
        .form-control:focus {
            border-color: #c0392b;
            box-shadow: 0 0 0 3px rgba(192,57,43,0.12);
        }
        .link-auth { color: #c0392b; text-decoration: none; font-weight: 500; }
        .link-auth:hover { text-decoration: underline; }
        #msgExito { display:none; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center py-5 min-vh-100">
        <div class="auth-card card p-4 p-md-5 my-auto">

            <div class="text-center mb-4">
                <div style="font-size:2.5rem;">🔑</div>
                <h1 class="fs-4 fw-bold mb-1" style="color:#c0392b;">Recuperar contraseña</h1>
                <p class="text-muted small">Te enviaremos un enlace a tu correo para crear una nueva contraseña.</p>
            </div>

            <!-- Formulario -->
            <div id="formWrap">
                <div class="mb-3" style="position:relative;">
                    <span style="position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px;">📧</span>
                    <input type="email" id="correo" class="form-control" style="padding-left:40px;"
                           placeholder="Tu correo registrado" required autocomplete="email">
                </div>

                <div id="alertaError" class="alert alert-danger rounded-3 d-none py-2 mb-3"></div>

                <button id="btnEnviar" onclick="solicitar()" class="btn btn-rosa w-100 py-3 mb-3">
                    <span id="btnTexto">Enviar enlace</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                </button>

                <p class="text-center text-muted small mb-0">
                    <a href="login.html" class="link-auth">← Volver al inicio de sesión</a>
                </p>
            </div>

            <!-- Mensaje de éxito -->
            <div id="msgExito" class="text-center">
                <div style="font-size:3.5rem;">📬</div>
                <h5 class="fw-bold mt-3" style="color:#27ae60;">¡Revisa tu correo!</h5>
                <p class="text-muted small">Si ese correo está registrado, recibirás el enlace en unos minutos.<br>
                   No olvides revisar la carpeta de spam.</p>
                <a href="login.html" class="btn btn-rosa mt-3 px-4">Volver al inicio</a>
            </div>

        </div>
    </div>

    <script>
        async function solicitar() {
            const correo = document.getElementById('correo').value.trim();

            if (!correo) {
                return mostrarError('Ingresa tu correo electrónico.');
            }

            setLoading(true);
            ocultarError();

            try {
                const res = await fetch('/usuarios/recuperar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo })
                });

                // Siempre mostramos éxito por seguridad
                document.getElementById('formWrap').style.display = 'none';
                document.getElementById('msgExito').style.display = 'block';

            } catch (err) {
                mostrarError('No se pudo conectar al servidor.');
            } finally {
                setLoading(false);
            }
        }

        function mostrarError(msg) {
            const el = document.getElementById('alertaError');
            el.textContent = msg;
            el.classList.remove('d-none');
        }
        function ocultarError() {
            document.getElementById('alertaError').classList.add('d-none');
        }
        function setLoading(v) {
            document.getElementById('btnEnviar').disabled = v;
            document.getElementById('btnTexto').textContent = v ? 'Enviando...' : 'Enviar enlace';
            document.getElementById('btnSpinner').classList.toggle('d-none', !v);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') solicitar();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
