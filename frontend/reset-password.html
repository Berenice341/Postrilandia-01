<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - Postrilandia</title>
    <meta name="description" content="Establece una nueva contraseña para tu cuenta de Postrilandia.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffe4ec 100%);
            min-height: 100vh;
        }
        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(192, 57, 43, 0.15);
            max-width: 420px;
            width: 100%;
        }
        .btn-rosa {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-rosa:hover {
            background: linear-gradient(135deg, #a93226, #cb4335);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.3);
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #f5c6cb;
            padding: 12px 15px;
        }
        .form-control:focus {
            border-color: #c0392b;
            box-shadow: 0 0 0 3px rgba(192,57,43,0.12);
        }
        .pass-toggle {
            position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #aaa; font-size: 16px; z-index: 2;
        }
        .strength-bar { height: 4px; border-radius: 4px; transition: all 0.3s; margin-top: 6px; }
        #msgExito { display: none; }
        #msgError { display: none; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center py-5 min-vh-100">
        <div class="auth-card card p-4 p-md-5 my-auto">

            <div class="text-center mb-4">
                <div style="font-size:2.5rem;">🔐</div>
                <h1 class="fs-4 fw-bold mb-1" style="color:#c0392b;">Nueva contraseña</h1>
                <p class="text-muted small">Elige una contraseña segura para tu cuenta.</p>
            </div>

            <!-- Token inválido -->
            <div id="msgError" class="text-center">
                <div style="font-size:3rem;">❌</div>
                <h5 class="text-danger fw-bold mt-2">Enlace inválido</h5>
                <p class="text-muted small" id="textoError">El enlace ha expirado o ya fue usado.</p>
                <a href="recuperar.html" class="btn btn-rosa mt-2 px-4">Solicitar nuevo enlace</a>
            </div>

            <!-- Formulario -->
            <div id="formWrap">
                <div style="position:relative;" class="mb-1">
                    <span style="position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; z-index:2;">🔒</span>
                    <input type="password" id="password" class="form-control" style="padding-left:40px;"
                           placeholder="Nueva contraseña (mín. 6 caracteres)"
                           oninput="checkStrength()" autocomplete="new-password">
                    <span class="pass-toggle" onclick="togglePass('password', this)">👁️</span>
                </div>
                <div class="strength-bar mb-3" id="strengthBar" style="background:#eee;"></div>

                <div style="position:relative;" class="mb-3">
                    <span style="position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; z-index:2;">🔒</span>
                    <input type="password" id="confirmar" class="form-control" style="padding-left:40px;"
                           placeholder="Confirmar nueva contraseña" autocomplete="new-password">
                    <span class="pass-toggle" onclick="togglePass('confirmar', this)">👁️</span>
                </div>

                <div id="alertaError" class="alert alert-danger rounded-3 d-none py-2 mb-3"></div>

                <button id="btnGuardar" onclick="guardar()" class="btn btn-rosa w-100 py-3 mb-2">
                    <span id="btnTexto">Guardar contraseña</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                </button>
            </div>

            <!-- Éxito -->
            <div id="msgExito" class="text-center">
                <div style="font-size:3.5rem;">✅</div>
                <h5 class="fw-bold mt-3" style="color:#27ae60;">¡Contraseña actualizada!</h5>
                <p class="text-muted small">Tu contraseña fue cambiada correctamente.</p>
                <a href="login.html" class="btn btn-rosa mt-3 px-5">Iniciar sesión</a>
            </div>

        </div>
    </div>

    <script>
        // Verificar que el token existe en la URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (!token) {
            document.getElementById('formWrap').style.display = 'none';
            document.getElementById('textoError').textContent = 'No se encontró el token en el enlace.';
            document.getElementById('msgError').style.display = 'block';
        }

        async function guardar() {
            const password  = document.getElementById('password').value;
            const confirmar = document.getElementById('confirmar').value;

            if (!password || !confirmar) return mostrarError('Completa ambos campos.');
            if (password.length < 6) return mostrarError('La contraseña debe tener al menos 6 caracteres.');
            if (password !== confirmar) return mostrarError('Las contraseñas no coinciden.');

            setLoading(true);
            ocultarError();

            try {
                const res = await fetch('/usuarios/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await res.json();
                document.getElementById('formWrap').style.display = 'none';

                if (res.ok) {
                    document.getElementById('msgExito').style.display = 'block';
                } else {
                    document.getElementById('textoError').textContent = data.mensaje;
                    document.getElementById('msgError').style.display = 'block';
                }
            } catch (err) {
                mostrarError('No se pudo conectar al servidor.');
            } finally {
                setLoading(false);
            }
        }

        function mostrarError(msg) {
            const el = document.getElementById('alertaError');
            el.textContent = msg;
            el.classList.remove('d-none');
        }
        function ocultarError() {
            document.getElementById('alertaError').classList.add('d-none');
        }
        function setLoading(v) {
            document.getElementById('btnGuardar').disabled = v;
            document.getElementById('btnTexto').textContent = v ? 'Guardando...' : 'Guardar contraseña';
            document.getElementById('btnSpinner').classList.toggle('d-none', !v);
        }
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.textContent = input.type === 'password' ? '👁️' : '🙈';
        }
        function checkStrength() {
            const val = document.getElementById('password').value;
            const bar = document.getElementById('strengthBar');
            let s = 0;
            if (val.length >= 6) s++;
            if (val.length >= 10) s++;
            if (/[A-Z]/.test(val)) s++;
            if (/[0-9]/.test(val)) s++;
            if (/[^A-Za-z0-9]/.test(val)) s++;
            const colors = ['#eee','#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60'];
            const widths = ['0%','20%','40%','60%','80%','100%'];
            bar.style.width = widths[s];
            bar.style.background = colors[s];
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
