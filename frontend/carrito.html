<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Postrilandia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark">
        <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
            <h1 class="text-white fs-4 mb-0">🛒 Mi Carrito</h1>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-light btn-sm" onclick="window.location.href='index.html'">← Volver</button>
                <button class="btn btn-danger btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <div id="mensaje-carrito" class="alert" style="display:none;"></div>

        <div class="row">

            <!-- Lista de productos -->
            <div class="col-md-8">
                <div class="admin-box shadow">
                    <h3 class="mb-4">🍰 Productos en tu carrito</h3>
                    <div id="listaCarrito"></div>
                </div>
            </div>

            <!-- Resumen + Método de pago -->
            <div class="col-md-4">
                <div class="admin-box shadow">
                    <h3 class="mb-4">📋 Resumen</h3>
                    <div id="resumenCarrito"></div>
                    <hr>
                    <h4 class="text-danger" id="totalCarrito"></h4>

                    <!-- MÉTODOS DE PAGO -->
                    <div class="mt-3" id="seccionPago">
                        <label class="form-label fw-bold">💳 Método de pago</label>

                        <div class="metodo-pago" onclick="seleccionarPago('efectivo')" id="pago-efectivo">
                            <span class="icono-pago">💵</span> Efectivo
                        </div>
                        <div class="metodo-pago" onclick="seleccionarPago('tarjeta')" id="pago-tarjeta">
                            <span class="icono-pago">💳</span> Tarjeta
                        </div>

                        <!-- EFECTIVO: monto recibido -->
                        <div id="campo-efectivo" style="display:none;" class="mt-3">
                            <label class="form-label text-muted small">¿Con cuánto paga?</label>
                            <input type="number" id="montoEfectivo" class="form-control"
                                placeholder="Ej. $500" min="0">
                        </div>

                        <!-- TARJETA: datos de tarjeta -->
                        <div id="campo-tarjeta" style="display:none;" class="mt-3">
                            <div class="tarjeta-preview mb-3" id="tarjetaPreview">
                                <div class="tarjeta-chip">▪️</div>
                                <div class="tarjeta-numero" id="previewNumero">•••• •••• •••• ••••</div>
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <div class="tarjeta-label">Titular</div>
                                        <div class="tarjeta-valor" id="previewNombre">NOMBRE APELLIDO</div>
                                    </div>
                                    <div class="text-end">
                                        <div class="tarjeta-label">Vence</div>
                                        <div class="tarjeta-valor" id="previewVence">MM/AA</div>
                                    </div>
                                </div>
                            </div>

                            <input type="text" id="numTarjeta" class="form-control mb-2"
                                placeholder="Número de tarjeta"
                                maxlength="19"
                                oninput="formatearTarjeta(this)"
                                inputmode="numeric">

                            <input type="text" id="nombreTarjeta" class="form-control mb-2"
                                placeholder="Nombre del titular"
                                oninput="actualizarPreview()"
                                style="text-transform:uppercase">

                            <div class="row g-2">
                                <div class="col-7">
                                    <input type="text" id="venceTarjeta" class="form-control"
                                        placeholder="MM/AA" maxlength="5"
                                        oninput="formatearVence(this)">
                                </div>
                                <div class="col-5">
                                    <input type="text" id="cvvTarjeta" class="form-control"
                                        placeholder="CVV" maxlength="3"
                                        inputmode="numeric">
                                </div>
                            </div>
                        </div>

                    </div>

                    <button class="btn btn-rosa w-100 mt-4" onclick="confirmarPedido()" id="btnComprar">
                        ✅ Confirmar Pedido
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL TICKET -->
    <div class="modal fade" id="modalTicket" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content ticket-modal">
                <div class="modal-body p-0">
                    <div id="contenidoTicket"></div>
                    <div class="d-flex gap-2 p-3">
                        <button class="btn btn-outline-secondary flex-fill" onclick="imprimirTicket()">
                            🖨️ Imprimir
                        </button>
                        <button class="btn btn-rosa flex-fill" onclick="cerrarTicket()">
                            ✅ Listo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="carrito.js"></script>
</body>
</html>
